name: Build Android App
on:
  push:
    branches: [ main, "رئيسي" ] # يشتغل تلقائياً عند دفع أي كود جديد

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Web Project
        run: bun run build

      - name: Set up JDK 17 (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize and Sync Android Platform
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Build APK and AAB with Gradle
        run: |
          cd android
          ./gradlew assembleDebug # يصنع ملف الـ APK للتجربة
          ./gradlew bundleRelease # يصنع ملف الـ AAB للمتجر

      - name: Upload APK & AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Game-Android-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab
