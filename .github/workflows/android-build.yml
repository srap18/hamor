name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Clean Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: |
          bun install
          bun install --production --ignore-scripts

      - name: Build Web Assets
        run: bun run build

      - name: Ensure Web Assets Dir
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then touch dist/index.html; fi

      - name: Setup Android Environment
        run: |
          mkdir -p assets
          if [ -f "assets/icon-only.png" ]; then cp assets/icon-only.png icon-only.png; fi
          if [ -f "assets/splash.png" ]; then cp assets/splash.png splash.png; fi
          if [ -f "assets/splash-dark.png" ]; then cp assets/splash-dark.png splash-dark.png; fi
          
          if [ ! -d "android" ]; then bunx cap add android; fi
          
          bunx @capacitor/assets generate --android --iconBackgroundColor "#000000" --splashBackgroundColor "#000000" --splashBackgroundColorDark "#000000"
          
          bunx cap sync android
          chmod +x android/gradlew

      - name: Configure Compatibility
        run: |
          cd android
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew clean
          
          # تحديث رقم الإصدار تلقائياً
          NEW_VERSION=$(( ${{ github.run_number }} + 100 ))
          sed -i "s/versionCode [0-9]*/versionCode $NEW_VERSION/" app/build.gradle
          
          # البناء (التوقيع يتم تلقائياً بواسطة Gradle)
          ./gradlew bundleRelease assembleRelease -x lint

      - name: Organize Artifacts
        run: |
          mkdir -p final-build
          cp android/app/build/outputs/bundle/release/*.aab ./final-build/hamor-play-store.aab
          cp android/app/build/outputs/apk/release/*.apk ./final-build/hamor-app-release.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Run-${{ github.run_number }}
          path: ./final-build/
          if-no-files-found: error
          retention-days: 1
