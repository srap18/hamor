name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 🛠️ رفع الإصدار لـ 4 (تأكد دائماً من زيادته عند كل رفع للمتجر)
      - name: Bump Android Version Code
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode [0-9]*/versionCode 4/g' android/app/build.gradle
          fi

      - name: Setup Android Assets & Sync
        run: |
          if [ ! -d "android" ]; then npx cap add android; fi
          bunx @capacitor/assets generate --android || true
          npx cap sync android
          chmod +x android/gradlew

      - name: Decode Production Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      # 🚀 البناء القوي مع تنظيف شامل
      - name: Build Android Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew clean
          ./gradlew bundleRelease

      # ✍️ التوقيع الاحترافي
      - name: Sign AAB
        run: |
          AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ./hamor-play-store.aab

      # 📦 رفع المخرجات
      - name: Upload Final Signed Files
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: |
            ./hamor-play-store.aab
