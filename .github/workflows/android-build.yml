name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Prepare Clean Dummy Web Directory for Ultra-Light Size
        run: |
          rm -rf dist
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hamor Game</title><script>window.location.href="https://www.molok-alqarasna.com";</script></head><body></body></html>' > dist/index.html

      - name: Set up JDK 21 (Required for modern Android/Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Map Custom Assets and Generate Icons & Splash Screens
        run: |
          # تهيئة مجلد الأصول الرئيسي
          mkdir -p assets
          
          # 🎯 إعادة تسمية الأيقونة لتتوافق مع متطلبات الأداة الإجبارية
          if [ -f "assets/icon-only.png" ]; then
            cp assets/icon-only.png assets/icon.png
          elif [ -f "icon-only.png" ]; then
            cp icon-only.png assets/icon.png
          fi

          # التأكد من ضبط ملفات شاشات الترحيب في مكانها الصحيح لطباعتها
          if [ -f "splash.png" ] && [ ! -f "assets/splash.png" ]; then cp splash.png assets/splash.png; fi
          if [ -f "splash-dark.png" ] && [ ! -f "assets/splash-dark.png" ]; then cp splash-dark.png assets/splash-dark.png; fi

          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          # تشغيل أمر توليد الأيقونات وشاشات الترحيب للأندرويد بشكل كامل
          bunx @capacitor/assets generate --android || true
          npx cap sync android
          chmod +x android/gradlew

      # 🔐 صناعة ملف توقيع جديد وقوي وثابت فوراً بكلمة المرور المحددة
      - name: Generate Fresh Production Keystore
        run: |
          keytool -genkeypair -v -keystore android/app/hamor-upload-key.keystore -alias hamor-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "HamorGame2026" -keypass "HamorGame2026" -dname "CN=Hamor, O=CodeArabi, C=EG"

      # 🏗️ بناء ملفات الأندرويد وتمرير المتغيرات بأمان
      - name: Build Android Artifacts (APK & AAB)
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      # ✍️ توقيع ملف الـ AAB بالشهادة الجديدة التي تم توليدها تلقائياً
      - name: Sign AAB for Google Play Console
        run: |
          AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ./hamor-play-store.aab

      - name: Upload Final Signed Files to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            ./hamor-play-store.aab
            android/app/hamor-upload-key.keystore
