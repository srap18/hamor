name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies & Build Web
        run: |
          bun install
          bun run build

      - name: Setup Android Environment
        run: |
          # إنشاء المجلدات الناقصة التي كانت تسبب خطأ ENOENT
          mkdir -p android/app/src/main/assets
          
          # إضافة الإضافات (Capacitor)
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx cap sync android
          chmod +x android/gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build Android App
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew clean
          # البناء والتوقيع التلقائي
          ./gradlew bundleRelease assembleRelease

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Final-Build
          path: |
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/outputs/apk/release/*.apk
