name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: bun install

      - name: Setup Android Environment
        run: |
          mkdir -p assets android/app/src/main/assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Decode Keystore & Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build and Optimize Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          # تحديث رقم الإصدار
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          
          # البناء الكامل (Bundle و APK)
          ./gradlew clean bundleRelease assembleRelease -x lint

      - name: Sign & Align Artifacts
        run: |
          KEYSTORE="android/app/hamor-upload-key.keystore"
          PASSWORD="HamorGame2026"
          ALIAS="hamor-key-alias"
          
          echo "--- بدء التوقيع والتحسين الاحترافي ---"
          
          # 1. توقيع الـ AAB
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $AAB $ALIAS || true
          mv $AAB ./hamor-play-store.aab
          
          # 2. تحسين وتوقيع الـ APK (السر هنا في Zipalign)
          # نأخذ الملف الخام
          RAW_APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          
          # استخدام Zipalign (مهم جداً لجعل الملف صالحاً للتثبيت)
          # ملاحظة: يجب التأكد من مسار zipalign في بيئة ubuntu-latest
          ZIPALIGN_PATH=$ANDROID_HOME/build-tools/*/zipalign
          $ZIPALIGN_PATH -v 4 $RAW_APK ./hamor-app-unsigned-aligned.apk
          
          # توقيع الملف المحسن
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD ./hamor-app-unsigned-aligned.apk $ALIAS || true
          mv ./hamor-app-unsigned-aligned.apk ./hamor-app-release.apk
          
          echo "تمت عملية التوقيع والتحسين بنجاح!"

      - name: Upload Final Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Global-Scale-Build-Ready
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
          if-no-files-found: error
