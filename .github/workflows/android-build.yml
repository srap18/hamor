name: Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      # نُنشئ dist/ احتياطي بـ index.html بسيط يُعيد التوجيه للموقع.
      # التطبيق الفعلي يُحمَّل من server.url في capacitor.config.ts،
      # لكن Capacitor sync يتطلب أن يكون webDir موجوداً وفيه ملف.
      - name: Prepare webDir fallback
        run: |
          mkdir -p dist
          cat > dist/index.html <<'EOF'
          <!doctype html>
          <html lang="ar" dir="rtl">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
              <title>ملوك القراصنة</title>
              <meta http-equiv="refresh" content="0;url=https://www.molok-alqarasna.com/" />
            </head>
            <body style="background:#000;color:#fff;font-family:system-ui;text-align:center;padding:40px">
              جاري تحميل اللعبة...
              <script>location.replace('https://www.molok-alqarasna.com/');</script>
            </body>
          </html>
          EOF

      - name: Setup Android & Sync
        run: |
          rm -rf android
          bunx cap add android
          mkdir -p android/app/src/main/assets

          # توليد أيقونات وسبلاش لجميع كثافات الشاشة تلقائياً
          # (الأداة ستبحث عن الصور تلقائياً في مجلد assets)
          bun add -D @capacitor/assets
          bunx capacitor-assets generate --android

          # تنظيف أيقونات أندرويد الافتراضية القديمة لضمان عدم تداخلها
          find android/app/src/main/res/ -name "ic_launcher*.png" -type f -delete
          
          # تنظيف المجلدات التي تسبب تعارضاً مع الأيقونات الجديدة
          rm -rf android/app/src/main/res/mipmap-anydpi-v26

          # نسخ الأيقونة يدوياً لجميع مجلدات mipmap لضمان ظهورها (بما فيها النوع Round)
          for folder in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
             if [ -d "android/app/src/main/res/mipmap-$folder" ]; then
                cp assets/icon-only.png "android/app/src/main/res/mipmap-$folder/ic_launcher.png"
                cp assets/icon-only.png "android/app/src/main/res/mipmap-$folder/ic_launcher_round.png"
             fi
          done

          bunx cap sync android

          # ضمان وجود الموارد الأساسية (strings.xml و file_paths.xml) بعد الـ Sync
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/xml
          
          cat > android/app/src/main/res/values/strings.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Hamor</string>
              <string name="title_activity_main">MainActivity</string>
          </resources>
          EOF

          cat > android/app/src/main/res/xml/file_paths.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <external-path name="files" path="." />
          </paths>
          EOF

          # تحقق أن الأيقونات وُلّدت فعلاً داخل mipmap (نفشل مبكراً لو ماوصلت)
          echo "== mipmap contents =="
          ls -la android/app/src/main/res/mipmap-* || true
          test -f android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png \
            || (echo "ERROR: ic_launcher.png missing in mipmap-xxxhdpi" && exit 1)

          # موارد ثابتة (ألوان + ثيم)
          cat > android/app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <color name="colorPrimary">#6200EE</color>
            <color name="colorPrimaryDark">#3700B3</color>
            <color name="colorAccent">#03DAC5</color>
          </resources>
          EOF
          cat > android/app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
            <style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="colorPrimary">@color/colorPrimary</item>
              <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
              <item name="colorAccent">@color/colorAccent</item>
            </style>
            <style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar">
              <item name="windowActionBar">false</item>
              <item name="windowNoTitle">true</item>
            </style>
            <style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen">
              <item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item>
            </style>
          </resources>
          EOF

          chmod +x android/gradlew

      - name: Build Unsigned Release APK and AAB
        run: |
          cd android
          # تحديث رقم الإصدار تلقائياً إلى 1001
          sed -i 's/versionCode [0-9]*/versionCode 1001/' app/build.gradle
          ./gradlew clean assembleRelease bundleRelease --no-daemon --stacktrace

      # تم تعطيل التوقيع لكي تقوم بتوقيعه يدوياً بنفسك كما طلبت، مع الحفاظ على كل السطور والتعليقات:
