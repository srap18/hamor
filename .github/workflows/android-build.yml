name: Build
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - uses: oven-sh/setup-bun@v1
      - run: bun install && bun run build

      - name: Setup Android & Sync
        run: |
          rm -rf android
          bunx cap add android
          mkdir -p android/app/src/main/assets
          
          # معالجة الصور الموجودة في مجلد assets لتطابق متطلبات Capacitor
          # تأكد من أن مجلد assets في مشروعك يحتوي على الملفات التي ذكرتها
          cp assets/icon-only.png assets/icon.png || true
          
          # توليد الأيقونات و Splash Screen تلقائياً
          bunx cap assets generate --android
          
          bunx cap sync android
          find android/app/src/main/assets -type f ! -name "*.json" -delete
          
          # حقن ملفات الموارد الأساسية لضمان عدم فشل الـ Build
          mkdir -p android/app/src/main/res/values
          echo '<?xml version="1.0" encoding="utf-8"?><resources><color name="colorPrimary">#6200EE</color><color name="colorPrimaryDark">#3700B3</color><color name="colorAccent">#03DAC5</color></resources>' > android/app/src/main/res/values/colors.xml
          echo '<?xml version="1.0" encoding="utf-8"?><resources><style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar"><item name="colorPrimary">@color/colorPrimary</item><item name="colorPrimaryDark">@color/colorPrimaryDark</item><item name="colorAccent">@color/colorAccent</item></style><style name="AppTheme.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar"><item name="windowActionBar">false</item><item name="windowNoTitle">true</item></style><style name="AppTheme.NoActionBarLaunch" parent="Theme.SplashScreen"><item name="postSplashScreenTheme">@style/AppTheme.NoActionBar</item></style></resources>' > android/app/src/main/res/values/styles.xml
          
          chmod +x android/gradlew

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build
        env:
          SIGNING_RELEASE_PASSWORD: ${{ secrets.SIGNING_RELEASE_PASSWORD }}
        run: |
          cd android
          ./gradlew clean assembleRelease bundleRelease -Pandroid.injected.signing.store.password=$SIGNING_RELEASE_PASSWORD -Pandroid.injected.signing.key.password=$SIGNING_RELEASE_PASSWORD -Pandroid.injected.signing.key.alias=hamor-key-alias

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-outputs
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
            android/app/build/reports/
