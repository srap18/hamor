name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Prepare Clean Dummy Web Directory
        run: |
          if [ -d "dist" ]; then rm -rf dist; fi
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hamor Game</title><script>window.location.href="https://www.molok-alqarasna.com";</script></head><body></body></html>' > dist/index.html

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 🛠️ تحديث الإصدار التلقائي
      - name: Bump Android Version Code to 2
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode 1/versionCode 2/g' android/app/build.gradle
          fi

      - name: Setup Android Assets
        run: |
          mkdir -p assets
          if [ ! -d "android" ]; then npx cap add android; fi
          bunx @capacitor/assets generate --android || true
          npx cap sync android
          chmod +x android/gradlew

      - name: Decode Production Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build Android Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      # ✍️ توقيع التطبيق بقوة (Sign)
      - name: Sign AAB
        run: |
          AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ./hamor-play-store.aab

      # 🔐 توليد الشهادة المطلوبة (PEM) وضغطها في ملف (Zip) ليرضى المتجر
      - name: Finalize Signing Certificates
        run: |
          keytool -export -rfc -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -alias hamor-key-alias -file ./upload_certificate.pem
          zip -j output.zip ./upload_certificate.pem
          echo "تم توليد الشهادات بنجاح."

      - name: Upload Final Signed Files
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: |
            ./hamor-play-store.aab
            ./output.zip
            ./upload_certificate.pem
