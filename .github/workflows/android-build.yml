name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: bun install

      - name: Setup Android Environment
        run: |
          mkdir -p assets android/app/src/main/assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Hard Fix Gradle and AGP Compatibility
        run: |
          cd android
          ./gradlew wrapper --gradle-version 8.11.1
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties

      - name: Decode Keystore & Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Verify Keystore & Extract Alias
        id: keystore_check
        run: |
          echo "--- فحص ملف التوقيع ---"
          # هذا الأمر سيطبع كل تفاصيل الملف في سجلات الـ GitHub Actions
          keytool -list -v -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026"
          
          # استخراج الاسم الفعلي وتخزينه كمتغير
          ALIAS=$(keytool -list -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" | grep "Alias name:" | head -n 1 | cut -d':' -f2 | xargs)
          echo "REAL_ALIAS=$ALIAS" >> $GITHUB_ENV
          echo "تم اكتشاف الاسم المستعار بنجاح وهو: $ALIAS"

      - name: Build Artifacts
        run: |
          cd android
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          ./gradlew clean bundleRelease assembleRelease

      - name: Sign & Optimize
        run: |
          KEYSTORE="android/app/hamor-upload-key.keystore"
          PASSWORD="HamorGame2026"
          
          echo "جاري التوقيع باستخدام Alias: ${{ env.REAL_ALIAS }}"
          
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $AAB "${{ env.REAL_ALIAS }}"
          mv $AAB ./hamor-play-store.aab
          
          APK=$(find android/app/build/outputs/apk/release/ -name "app-release-unsigned.apk" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $APK "${{ env.REAL_ALIAS }}"
          mv $APK ./hamor-app-release.apk

      - name: Upload Final Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Global-Scale-Build-Ready
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
