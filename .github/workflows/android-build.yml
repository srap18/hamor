name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Force Clean Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const artifact of artifacts.data.artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact: ${artifact.name}`);
            }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies
        run: |
          bun install
          bun install --production --ignore-scripts

      - name: Build Web Assets
        run: bun run build

      - name: Ensure Web Assets Dir
        run: |
          mkdir -p dist
          if [ ! -f dist/index.html ]; then touch dist/index.html; fi

      - name: Setup Android Environment
        run: |
          mkdir -p assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ -f "splash.png" ]; then cp splash.png assets/splash.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Configure Compatibility
        run: |
          cd android
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build and Optimize Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew clean
          rm -rf app/build/outputs/apk/
          rm -rf app/build/outputs/bundle/
          
          # تعديل ذكي لزيادة رقم الإصدار تلقائياً (رقم البناء + 100)
          NEW_VERSION=$(( ${{ github.run_number }} + 100 ))
          sed -i "s/versionCode [0-9]*/versionCode $NEW_VERSION/" app/build.gradle
          
          ./gradlew bundleRelease assembleRelease -x lint

      - name: Sign & Align Artifacts
        run: |
          KEYSTORE="android/app/hamor-upload-key.keystore"
          PASSWORD="HamorGame2026"
          ALIAS="hamor-key-alias"
          
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $AAB $ALIAS || true
          mv $AAB ./hamor-play-store.aab
          
          APK=$(find android/app/build/outputs/apk/release/ -name "app-release-unsigned.apk" -o -name "app-release.apk" | head -n 1)
          if [ -f "$APK" ]; then
            ZIPALIGN_PATH=$(find $ANDROID_HOME/build-tools/ -name zipalign | head -n 1)
            $ZIPALIGN_PATH -v 4 $APK ./hamor-app-release-aligned.apk
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD ./hamor-app-release-aligned.apk $ALIAS || true
            mv ./hamor-app-release-aligned.apk ./hamor-app-release.apk
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Build-Run-${{ github.run_number }}
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
          if-no-files-found: error
          retention-days: 1
