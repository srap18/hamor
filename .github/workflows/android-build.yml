name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Web Project and Create Dummy Index
        run: |
          bun run build || true
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hamor Game</title></head><body></body></html>' > dist/index.html

      - name: Set up JDK 17 (Required for Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize and Sync Android Platform
        run: |
          [ -d "android" ] || npx cap add android
          npx cap sync android
          chmod +x android/gradlew

      - name: Create Production Keystore (Auto-Generate)
        run: |
          keytool -genkeypair -v -keystore hamor-upload-key.keystore -alias hamor-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass "HamorPass2026" -keypass "HamorPass2026" -dname "CN=Hamor, O=CodeArabi, C=EG"

      - name: Build Android Artifacts (APK & AAB)
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      - name: Sign AAB for Google Play Console
        run: |
          AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore hamor-upload-key.keystore -storepass "HamorPass2026" -keypass "HamorPass2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ./hamor-play-store.aab

      - name: Upload Final Signed Files to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            ./hamor-play-store.aab
            ./hamor-upload-key.keystore
