name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Node Modules & Gradle
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-build-${{ hashFiles('**/bun.lock') }}

      - name: Install Dependencies
        run: bun install

      - name: Setup Android Environment
        run: |
          mkdir -p assets android/app/src/main/assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Configure Compatibility
        run: |
          cd android
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Decode Keystore & Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          ./gradlew clean bundleRelease assembleRelease -x lint

      - name: Sign & Optimize
        run: |
          KEYSTORE="android/app/hamor-upload-key.keystore"
          PASSWORD="HamorGame2026"
          ALIAS="hamor-key-alias"
          
          echo "--- بدء عملية التوقيع الآمن ---"
          
          # توقيع AAB (البحث الذكي عن أي ملف .aab)
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          if [ -f "$AAB" ]; then
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $AAB $ALIAS || true
            mv $AAB ./hamor-play-store.aab
            echo "تم توقيع AAB بنجاح."
          else
            echo "خطأ: لم يتم العثور على ملف AAB!"
            exit 1
          fi
          
          # توقيع APK (البحث الذكي عن أي ملف .apk)
          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -n 1)
          if [ -f "$APK" ]; then
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $APK $ALIAS || true
            mv $APK ./hamor-app-release.apk
            echo "تم توقيع APK بنجاح."
          else
            echo "خطأ: لم يتم العثور على أي ملف APK!"
            echo "محتويات مجلد المخرجات:"
            ls -R android/app/build/outputs/apk/ || echo "المجلد فارغ"
            exit 1
          fi

      - name: Upload Final Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Global-Scale-Build-Ready
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
          if-no-files-found: error
