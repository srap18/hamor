name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # نضمن وجود المجلدات ونقل الأصول (Icons/Splash) من مسارها الحقيقي
      - name: Copy Assets and Prepare Android
        run: |
          mkdir -p assets
          # التأكد من وجود ملفات الأيقونات والسبلاش في مجلد assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ -f "splash.png" ]; then cp splash.png assets/splash.png; fi
          if [ -f "splash-dark.png" ]; then cp splash-dark.png assets/splash-dark.png; fi
          
          # إنشاء مجلد الأندرويد إذا لم يكن موجوداً
          if [ ! -d "android" ]; then npx cap add android; fi
          mkdir -p android/app/src/main/assets
          
          # توليد الأيقونات
          bunx @capacitor/assets generate --android
          
          # مزامنة
          npx cap sync android

      - name: Decode Production Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build and Sign
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew clean
          ./gradlew bundleRelease
          
          # توقيع الملف الناتج مباشرة في مسار البناء
          AAB_FILE=$(find app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ../hamor-play-store.aab

      - name: Upload Final Build
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: ./hamor-play-store.aab
