name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Node Modules & Gradle
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-build-${{ hashFiles('**/bun.lock') }}

      - name: Install Dependencies
        run: bun install

      - name: Build Web Assets
        run: bun run build

      - name: Setup Android Environment
        run: |
          mkdir -p assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ -f "splash.png" ]; then cp splash.png assets/splash.png; fi
          if [ -f "splash-dark.png" ]; then cp splash-dark.png assets/splash-dark.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Configure Compatibility
        run: |
          cd android
          echo "android.suppressUnsupportedCompileSdk=36" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Decode Keystore & Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      - name: Build and Optimize Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          # تنظيف شامل قبل البناء
          ./gradlew clean
          rm -rf app/build/outputs/apk/
          rm -rf app/build/outputs/bundle/
          
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          
          # البناء باستخدام bundleRelease فقط (يوفر مساحة أكبر من APK العادي)
          ./gradlew bundleRelease assembleRelease -x lint

      - name: Sign & Align Artifacts
        run: |
          KEYSTORE="android/app/hamor-upload-key.keystore"
          PASSWORD="HamorGame2026"
          ALIAS="hamor-key-alias"
          
          # توقيع AAB
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD $AAB $ALIAS || true
          mv $AAB ./hamor-play-store.aab
          
          # توقيع APK
          APK=$(find android/app/build/outputs/apk/release/ -name "app-release-unsigned.apk" | head -n 1)
          if [ -f "$APK" ]; then
            $ANDROID_HOME/build-tools/*/zipalign -v 4 $APK ./hamor-app-release-aligned.apk
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore $KEYSTORE -storepass $PASSWORD -keypass $PASSWORD ./hamor-app-release-aligned.apk $ALIAS || true
            mv ./hamor-app-release-aligned.apk ./hamor-app-release.apk
          fi

      - name: Upload Final Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Global-Scale-Build-Ready
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
          if-no-files-found: error
