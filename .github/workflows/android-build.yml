name: Global-Scale-Android-Build
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Node Modules & Gradle
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-build-${{ hashFiles('**/bun.lock') }}

      - name: Install Dependencies
        run: bun install

      - name: Setup Android Environment
        run: |
          mkdir -p assets android/app/src/main/assets
          if [ -f "icon-only.png" ]; then cp icon-only.png assets/icon.png; fi
          if [ ! -d "android" ]; then bunx cap add android; fi
          bunx @capacitor/assets generate --android
          bunx cap sync android
          chmod +x android/gradlew

      - name: Force Android Gradle Plugin Update
        run: |
          # 1. تحديث نسخة الـ AGP في ملف build.gradle الرئيسي
          # البحث عن السطر الذي يحتوي على com.android.tools.build:gradle وتحديثه إلى 8.9.1
          sed -i 's/com.android.tools.build:gradle:[0-9.]*/com.android.tools.build:gradle:8.9.1/g' android/build.gradle
          
          # 2. إضافة ممانعة الخطأ لـ SDK
          echo "android.suppressUnsupportedCompileSdk=36" >> android/gradle.properties
          
          # 3. التأكد من استخدام Gradle wrapper حديث
          cd android && ./gradlew wrapper --gradle-version 8.10

      - name: Decode Keystore & Secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env.production
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env.production

      - name: Build Artifacts
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle
          ./gradlew clean bundleRelease assembleRelease

      - name: Sign & Optimize
        run: |
          AAB=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB hamor-key-alias
          mv $AAB ./hamor-play-store.aab
          
          APK=$(find android/app/build/outputs/apk/release/ -name "app-release-unsigned.apk" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $APK hamor-key-alias
          mv $APK ./hamor-app-release.apk

      - name: Upload Final Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Global-Scale-Build-Ready
          path: |
            ./hamor-play-store.aab
            ./hamor-app-release.apk
