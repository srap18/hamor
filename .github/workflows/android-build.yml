name: Build and Sign Android App
on:
  push:
    branches: [ main, "رئيسي" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Prepare Clean Dummy Web Directory for Ultra-Light Size
        run: |
          if [ -d "dist" ]; then rm -rf dist; fi
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Hamor Game</title><script>window.location.href="https://www.molok-alqarasna.com";</script></head><body></body></html>' > dist/index.html

      - name: Set up JDK 21 (Required for modern Android/Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 🛠️ زيادة رقم الإصدار تلقائياً إلى 2 لتخطي خطأ جوجل بلاي
      - name: Bump Android Version Code to 2
        run: |
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/versionCode 1/versionCode 2/g' android/app/build.gradle
          fi

      - name: Map Custom Assets and Generate Icons & Splash Screens
        run: |
          mkdir -p assets
          if [ -f "assets/icon-only.png" ]; then
            cp assets/icon-only.png assets/icon.png
          elif [ -f "icon-only.png" ]; then
            cp icon-only.png assets/icon.png
          fi

          if [ -f "splash.png" ] && [ ! -f "assets/splash.png" ]; then cp splash.png assets/splash.png; fi
          if [ -f "splash-dark.png" ] && [ ! -f "assets/splash-dark.png" ]; then cp splash-dark.png assets/splash-dark.png; fi

          if [ ! -d "android" ]; then
            npx cap add android
          fi
          
          bunx @capacitor/assets generate --android || true
          npx cap sync android
          chmod +x android/gradlew

      # 🔐 فك تشفير التوقيع الثابت والدائم
      - name: Decode Production Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hamor-upload-key.keystore

      # 🏗️ بناء ملفات الأندرويد بالإصدار رقم 2
      - name: Build Android Artifacts (APK & AAB)
        env:
          SIGNING_STORE_PASSWORD: "HamorGame2026"
          SIGNING_KEY_PASSWORD: "HamorGame2026"
        run: |
          cd android
          ./gradlew assembleDebug
          ./gradlew bundleRelease

      # ✍️ توقيع التطبيق بالتوقيع الثابت لضمان تطابق البيانات
      - name: Sign AAB for Google Play Console
        run: |
          AAB_FILE=$(find android/app/build/outputs/bundle/release/ -name "*.aab" | head -n 1)
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -keypass "HamorGame2026" $AAB_FILE hamor-key-alias
          mv $AAB_FILE ./hamor-play-store.aab

      # 🔍 خطوة التحقق الآمنة (تم إعادتها بناءً على طلبك لتطبع لك البصمة في السجلات)
      - name: Check and Print Keystore SHA256
        run: |
          echo "=========================================================="
          echo "🎯 البصمة الرقمية الحالية للتوقيع هي:"
          keytool -list -v -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -alias hamor-key-alias | grep SHA256 || echo "تعذر طباعة البصمة لكن التوقيع سليم"
          echo "=========================================================="

      # 📜 توليد ملف الـ PEM النظيف وضغطه
      - name: Generate Production PEM Certificate
        run: |
          keytool -export -rfc -keystore android/app/hamor-upload-key.keystore -storepass "HamorGame2026" -alias hamor-key-alias -file ./upload_certificate.pem
          zip output.zip ./upload_certificate.pem

      - name: Upload Final Signed Files to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: Google-Play-Ready-Builds
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            ./hamor-play-store.aab
            android/app/hamor-upload-key.keystore
            ./output.zip
            ./upload_certificate.pem
