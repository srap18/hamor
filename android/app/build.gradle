
apply plugin: 'com.android.application'

android {
    namespace = "com.hamor.game"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.hamor.game"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 101
        versionName "2.0.0"
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            storeFile file("hamor-upload-key.keystore")
            storePassword System.getenv("SIGNING_RELEASE_PASSWORD")
            keyAlias "hamor-key-alias"
            keyPassword System.getenv("SIGNING_RELEASE_PASSWORD")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    
    // هذه المكتبات هي التي كانت تسبب خطأ عدم العثور على الموارد (Resources)
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    implementation 'androidx.multidex:multidex:2.0.1'
    
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'
